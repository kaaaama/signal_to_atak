services:
  signal-cli-rest-api:
    # latest image is broken right now, should be replaced with :latest later
    image: bbernhard/signal-cli-rest-api:1772989209-ci
    container_name: signal-cli-rest-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      MODE: ${SIGNAL_API_MODE}
      LOG_LEVEL: ${SIGNAL_API_LOG_LEVEL}
      JSON_RPC_IGNORE_ATTACHMENTS: "true"
      JSON_RPC_IGNORE_STORIES: "true"
      JSON_RPC_IGNORE_AVATARS: "true"
      JSON_RPC_IGNORE_STICKERS: "true"
    volumes:
      - signal_cli_data:/home/.local/share/signal-cli

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  tak-db:
    build:
      context: ./infra/tak
      dockerfile: docker/Dockerfile.takserver-db
    container_name: tak-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${TAK_POSTGRES_DB}
      POSTGRES_USER: ${TAK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TAK_POSTGRES_PASSWORD}
    volumes:
      - ./infra/tak/tak:/opt/tak
      - tak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 10

  takserver:
    build:
      context: ./infra/tak
      dockerfile: docker/Dockerfile.takserver
    container_name: takserver
    restart: unless-stopped
    depends_on:
      tak-db:
        condition: service_healthy
    volumes:
      - ./infra/tak/tak:/opt/tak
    ports:
      - "8089:8089"
      - "8443:8443"
      - "8446:8446"

  bot:
    build: .
    container_name: bot
    restart: unless-stopped
    env_file:
      - .env
    user: "${LOCAL_UID}:${LOCAL_GID}"
    init: true
    volumes:
      - .:/app
      - ./infra/tak/tak/certs/files:/certs:ro
    working_dir: /app
    depends_on:
      signal-cli-rest-api:
        condition: service_started
      postgres:
        condition: service_healthy
      takserver:
        condition: service_started

volumes:
  signal_cli_data:
  postgres_data:
  tak_db_data: